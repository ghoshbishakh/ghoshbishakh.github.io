{{ define "main" }}
<article class="post-content" itemscope itemtype="http://schema.org/BlogPosting">
<header class="post-header">
<h1 itemprop="name headline">{{ .Title }}</h1>
<div class="post-meta">
<time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}" itemprop="datePublished">{{ .Date.Format "Jan 2, 2006" }}</time>
{{ if .Params.author }}<span>• <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span itemprop="name">{{ .Params.author }}</span></span></span>{{ end }}
</div>
{{ if .Params.tags }}
<div class="post-tags">
{{ range .Params.tags }}
<a href="/blog/tag/{{ . | urlize }}/" class="post-tag">{{ . }}</a>
{{ end }}
</div>
{{ end }}
</header>

<div itemprop="articleBody">
{{ .Content }}
</div>

{{ if .Params.comments }}
<div id="disqus_thread"></div>
<script>
  var disqus_config = function () {
      this.page.url = "http://ghoshbishakh.disqus.com{{ .RelPermalink }}";
      this.page.identifier = "{{ .File.UniqueID }}";
  };
  (function() {
    var d = document, s = d.createElement('script');
    s.src = '//ghoshbishakh.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
  })();
</script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" rel="nofollow">comments powered by Disqus.</a></noscript>
{{ end }}
</article>
{{ end }}
