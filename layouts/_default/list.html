{{ define "main" }}
<div class="page-header">
<h1>{{ .Title }}</h1>
{{ if .Params.subtitle }}<p class="subtitle">{{ .Params.subtitle }}</p>{{ end }}
</div>

{{ .Content }}

<ul class="blog-list">
{{ range .Pages.ByDate.Reverse }}
<li>
<a href="{{ .RelPermalink }}" class="blog-card">
<div class="blog-card-title">{{ .Title }}</div>
<div class="blog-card-meta">
<time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
</div>
{{ with .Description }}<div class="blog-card-desc">{{ . }}</div>{{ end }}
</a>
</li>
{{ end }}
</ul>
{{ end }}
