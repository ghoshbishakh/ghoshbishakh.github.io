<div id="hero-canvas"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var container = document.getElementById('hero-canvas');
  var hero = document.querySelector('.hero');
  if (!container || !hero) return;

  var width = window.innerWidth;
  var height = hero.offsetHeight;
  if (width === 0 || height === 0) return;

  var scene = new THREE.Scene();

  var aspect = width / height;
  var camera = new THREE.PerspectiveCamera(35, aspect, 0.1, 1000);
  camera.position.set(0, 2, 18);
  camera.lookAt(0, 0, 0);

  var renderer = new THREE.WebGLRenderer({
    alpha: true,
    antialias: true,
  });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  var cols = 50;
  var rows = 20;
  var meshW = 40;
  var meshH = 8;
  var spacingW = meshW / cols;
  var spacingH = meshH / rows;

  var positions = [];
  var origPos = [];

  function addLine(x1, y1, z1, x2, y2, z2) {
    positions.push(x1, y1, z1, x2, y2, z2);
    origPos.push(x1, y1, z1, x2, y2, z2);
  }

  for (var r = 0; r <= rows; r++) {
    var y = (r / rows - 0.5) * meshH;
    for (var c = 0; c < cols; c++) {
      var x1 = (c / cols - 0.5) * meshW;
      var x2 = ((c + 1) / cols - 0.5) * meshW;
      addLine(x1, y, 0, x2, y, 0);
    }
  }

  for (var c = 0; c <= cols; c++) {
    var x = (c / cols - 0.5) * meshW;
    for (var r = 0; r < rows; r++) {
      var y1 = (r / rows - 0.5) * meshH;
      var y2 = ((r + 1) / rows - 0.5) * meshH;
      addLine(x, y1, 0, x, y2, 0);
    }
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

  var colorArr = new Float32Array(positions.length);
  for (var i = 0; i < positions.length / 3; i++) {
    var y = positions[i * 3 + 1];
    var fade = 1 - Math.abs(y) / (meshH / 2);
    fade = Math.max(0, Math.pow(fade, 2.0));
    var bright = 0.4 + fade * 0.3;
    colorArr[i * 3] = 0.145 * bright;
    colorArr[i * 3 + 1] = 0.388 * bright;
    colorArr[i * 3 + 2] = 0.922 * bright;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colorArr, 3));

  var mat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.12,
  });
  var lines = new THREE.LineSegments(geo, mat);
  scene.add(lines);

  var startTime = Date.now();

  function animate() {
    requestAnimationFrame(animate);
    var t = (Date.now() - startTime) / 1000;
    var pos = lines.geometry.attributes.position.array;

    for (var i = 0; i < pos.length / 3; i++) {
      var ix = i * 3;
      var ox = origPos[ix];
      var oy = origPos[ix + 1];
      var oz = origPos[ix + 2];

      var wave1 = Math.sin(ox * 1.0 + t * 1.2) * 0.2;
      var wave2 = Math.sin(oy * 0.8 + t * 1.6) * 0.12;
      var wave3 = Math.sin((ox + oy) * 0.5 + t * 0.7) * 0.08;
      pos[ix + 2] = oz + wave1 + wave2 + wave3;
    }

    lines.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', function() {
    var w = window.innerWidth;
    var h = hero.offsetHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
});
</script>
