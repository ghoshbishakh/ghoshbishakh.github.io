<div id="hero-canvas"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const container = document.getElementById('hero-canvas');
const hero = document.querySelector('.hero');
if (!container || !hero) return;

const width = hero.offsetWidth;
const height = hero.offsetHeight;
if (width === 0 || height === 0) return;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
camera.position.set(0, 0, 16);

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true,
  powerPreference: 'high-performance',
});
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
container.appendChild(renderer.domElement);

const clock = new THREE.Clock();

// --- Central Torus Knot ---
const knotGeo = new THREE.TorusKnotGeometry(1.8, 0.6, 180, 24);
const knotMat = new THREE.MeshPhysicalMaterial({
  color: 0x3b82f6,
  emissive: 0x2563eb,
  emissiveIntensity: 0.15,
  metalness: 0.3,
  roughness: 0.4,
  transparent: true,
  opacity: 0.85,
  wireframe: false,
});
const knot = new THREE.Mesh(knotGeo, knotMat);
knot.position.y = 0.4;
scene.add(knot);

const knotWire = new THREE.Mesh(
  new THREE.TorusKnotGeometry(1.82, 0.62, 180, 24),
  new THREE.MeshBasicMaterial({
    color: 0x60a5fa,
    wireframe: true,
    transparent: true,
    opacity: 0.15,
  })
);
knotWire.position.y = 0.4;
scene.add(knotWire);

// --- Orbiting Ring of small shapes ---
const orbitGroup = new THREE.Group();
scene.add(orbitGroup);

const shapeTypes = [
  { geo: new THREE.OctahedronGeometry(0.4), color: 0x7c3aed, emissive: 0x6d28d9 },
  { geo: new THREE.IcosahedronGeometry(0.35), color: 0x06b6d4, emissive: 0x0891b2 },
  { geo: new THREE.DodecahedronGeometry(0.3), color: 0x8b5cf6, emissive: 0x7c3aed },
  { geo: new THREE.TetrahedronGeometry(0.35), color: 0x3b82f6, emissive: 0x2563eb },
  { geo: new THREE.BoxGeometry(0.35, 0.35, 0.35), color: 0x60a5fa, emissive: 0x3b82f6 },
];

const orbiters = [];
const orbitRadius = 4.2;
shapeTypes.forEach((spec, i) => {
  const mat = new THREE.MeshPhysicalMaterial({
    color: spec.color,
    emissive: spec.emissive,
    emissiveIntensity: 0.2,
    metalness: 0.6,
    roughness: 0.3,
    transparent: true,
    opacity: 0.8,
  });
  const mesh = new THREE.Mesh(spec.geo, mat);
  const angle = (i / shapeTypes.length) * Math.PI * 2;
  mesh.position.set(Math.cos(angle) * orbitRadius, (Math.random() - 0.5) * 1.5, Math.sin(angle) * orbitRadius);
  mesh.userData = {
    angle: angle,
    radius: orbitRadius + (Math.random() - 0.5) * 0.8,
    speed: 0.15 + Math.random() * 0.1,
    yOffset: (Math.random() - 0.5) * 1.5,
    ySpeed: 0.3 + Math.random() * 0.2,
    rotSpeed: 0.5 + Math.random() * 0.5,
  };
  orbitGroup.add(mesh);
  orbiters.push(mesh);

  const wireMat = new THREE.MeshBasicMaterial({
    color: spec.color,
    wireframe: true,
    transparent: true,
    opacity: 0.2,
  });
  const wire = new THREE.Mesh(spec.geo.clone(), wireMat);
  wire.scale.set(1.05, 1.05, 1.05);
  mesh.add(wire);
});

// --- Orbital rings (visual paths) ---
const ringPoints = [];
const ringSegments = 64;
for (let i = 0; i <= ringSegments; i++) {
  const theta = (i / ringSegments) * Math.PI * 2;
  ringPoints.push(new THREE.Vector3(Math.cos(theta) * orbitRadius, 0, Math.sin(theta) * orbitRadius));
}
const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPoints);
const ringMat = new THREE.LineBasicMaterial({
  color: 0x3b82f6,
  transparent: true,
  opacity: 0.06,
});
const ringLine = new THREE.Line(ringGeo, ringMat);
scene.add(ringLine);

// Second ring slightly tilted
const ring2Points = [];
for (let i = 0; i <= ringSegments; i++) {
  const theta = (i / ringSegments) * Math.PI * 2;
  const r = orbitRadius + 0.8;
  ring2Points.push(new THREE.Vector3(Math.cos(theta) * r, 0.6, Math.sin(theta) * r * 0.9));
}
const ring2Geo = new THREE.BufferGeometry().setFromPoints(ring2Points);
const ring2Mat = new THREE.LineBasicMaterial({
  color: 0x7c3aed,
  transparent: true,
  opacity: 0.04,
});
const ring2Line = new THREE.Line(ring2Geo, ring2Mat);
scene.add(ring2Line);

// --- Particle field ---
const particleCount = 600;
const pPositions = new Float32Array(particleCount * 3);
const pSizes = new Float32Array(particleCount);
const pColors = new Float32Array(particleCount * 3);

const colorPalette = [
  new THREE.Color(0x3b82f6),
  new THREE.Color(0x7c3aed),
  new THREE.Color(0x06b6d4),
  new THREE.Color(0x8b5cf6),
  new THREE.Color(0x60a5fa),
];

for (let i = 0; i < particleCount; i++) {
  const radius = 6 + Math.random() * 12;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  pPositions[i * 3] = Math.sin(phi) * Math.cos(theta) * radius;
  pPositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * radius * 0.6;
  pPositions[i * 3 + 2] = Math.cos(phi) * radius;
  pSizes[i] = 0.02 + Math.random() * 0.06;
  const c = colorPalette[i % colorPalette.length];
  pColors[i * 3] = c.r;
  pColors[i * 3 + 1] = c.g;
  pColors[i * 3 + 2] = c.b;
}

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));
pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

const pMat = new THREE.PointsMaterial({
  size: 0.06,
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
  depthWrite: false,
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// --- Mouse tracking ---
let targetRotX = 0, targetRotY = 0;
let currentRotX = 0, currentRotY = 0;

document.addEventListener('mousemove', (e) => {
  const rect = hero.getBoundingClientRect();
  targetRotX = ((e.clientY - rect.top) / rect.height - 0.5) * 0.6;
  targetRotY = ((e.clientX - rect.left) / rect.width - 0.5) * 0.6;
});

// --- Resize ---
window.addEventListener('resize', () => {
  const w = hero.offsetWidth;
  const h = hero.offsetHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// --- Animate ---
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Torus knot
  knot.rotation.x = t * 0.15;
  knot.rotation.y = t * 0.25;
  knotWire.rotation.x = knot.rotation.x;
  knotWire.rotation.y = knot.rotation.y;
  knot.position.y = 0.4 + Math.sin(t * 0.5) * 0.15;

  // Orbiters
  orbiters.forEach((mesh) => {
    const data = mesh.userData;
    data.angle += data.speed * 0.01;
    const r = data.radius;
    mesh.position.x = Math.cos(data.angle) * r;
    mesh.position.z = Math.sin(data.angle) * r;
    mesh.position.y = data.yOffset + Math.sin(t * data.ySpeed) * 0.5;
    mesh.rotation.x += data.rotSpeed * 0.01;
    mesh.rotation.y += data.rotSpeed * 0.015;
    mesh.rotation.z += data.rotSpeed * 0.008;
  });

  // Orbit rings
  ringLine.rotation.x = Math.sin(t * 0.1) * 0.05;
  ringLine.rotation.z = Math.cos(t * 0.13) * 0.03;
  ring2Line.rotation.x = Math.sin(t * 0.08 + 1) * 0.07;
  ring2Line.rotation.z = Math.cos(t * 0.11 + 1) * 0.05;

  // Particles - gentle rotation
  particles.rotation.y = t * 0.02;
  particles.rotation.x = Math.sin(t * 0.015) * 0.05;

  // Mouse parallax with smooth interpolation
  currentRotX += (targetRotX - currentRotX) * 0.03;
  currentRotY += (targetRotY - currentRotY) * 0.03;

  orbitGroup.rotation.x = currentRotX * 0.3;
  orbitGroup.rotation.y = currentRotY * 0.3;

  camera.position.x = currentRotY * 0.5;
  camera.position.y = -currentRotX * 0.5;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();
</script>
