<div id="hero-canvas"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var container = document.getElementById('hero-canvas');
  var hero = document.querySelector('.hero');
  if (!container || !hero) return;

  var width = hero.offsetWidth;
  var height = hero.offsetHeight;
  if (width === 0 || height === 0) return;

  var scene = new THREE.Scene();

  var camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.set(0, 3, 10);
  camera.lookAt(0, 0, 0);

  var renderer = new THREE.WebGLRenderer({
    alpha: true,
    antialias: true,
  });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  var segW = 64;
  var segH = 48;
  var meshW = 14;
  var meshH = 8;

  var geo = new THREE.PlaneGeometry(meshW, meshH, segW, segH);
  geo.rotateX(-Math.PI / 2);

  var pos = geo.attributes.position.array;
  var colors = new Float32Array(pos.length);

  for (var i = 0; i < pos.length / 3; i++) {
    var y = pos[i * 3 + 1];
    var fade = 1 - Math.abs(y) / (meshH / 2);
    fade = Math.max(0, Math.pow(fade, 1.5));
    colors[i * 3] = 0.145;
    colors[i * 3 + 1] = 0.388;
    colors[i * 3 + 2] = 0.922;
    colors[i * 3] *= fade;
    colors[i * 3 + 1] *= fade;
    colors[i * 3 + 2] *= fade;
  }

  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  var origins = new Float32Array(pos.length);
  for (var i = 0; i < pos.length; i++) {
    origins[i] = pos[i];
  }

  var mat = new THREE.MeshBasicMaterial({
    vertexColors: true,
    wireframe: false,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide,
  });
  var mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  var wireMat = new THREE.MeshBasicMaterial({
    color: 0x3b82f6,
    wireframe: true,
    transparent: true,
    opacity: 0.06,
    side: THREE.DoubleSide,
  });
  var wireMesh = new THREE.Mesh(geo.clone(), wireMat);
  scene.add(wireMesh);

  var startTime = Date.now();

  function animate() {
    requestAnimationFrame(animate);
    var t = (Date.now() - startTime) / 1000;

    var pos2 = mesh.geometry.attributes.position.array;
    var wirePos = wireMesh.geometry.attributes.position.array;

    for (var i = 0; i < pos2.length / 3; i++) {
      var ix = i * 3;
      var ox = origins[ix];
      var oy = origins[ix + 1];
      var oz = origins[ix + 2];

      var wave1 = Math.sin(ox * 1.2 + t * 1.5) * 0.3;
      var wave2 = Math.sin(oy * 0.8 + t * 2.0) * 0.2;
      var wave3 = Math.sin((ox + oy) * 0.6 + t * 1.0) * 0.15;
      var z = oz + wave1 + wave2 + wave3;

      pos2[ix] = ox;
      pos2[ix + 1] = oy;
      pos2[ix + 2] = z;
      wirePos[ix] = ox;
      wirePos[ix + 1] = oy;
      wirePos[ix + 2] = z;
    }

    mesh.geometry.attributes.position.needsUpdate = true;
    wireMesh.geometry.attributes.position.needsUpdate = true;

    mesh.rotation.y = Math.sin(t * 0.05) * 0.1;
    wireMesh.rotation.y = mesh.rotation.y;

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', function() {
    var w = hero.offsetWidth;
    var h = hero.offsetHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
});
</script>
