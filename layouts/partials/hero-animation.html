<div id="hero-canvas"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var container = document.getElementById('hero-canvas');
  var hero = document.querySelector('.hero');
  if (!container || !hero) return;

  var width = window.innerWidth;
  var height = hero.offsetHeight;
  if (width === 0 || height === 0) return;

  var scene = new THREE.Scene();

  var aspect = width / height;
  var camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 1000);
  camera.position.set(0, 1.2, 4);
  camera.lookAt(0, 0.2, -12);

  var renderer = new THREE.WebGLRenderer({
    alpha: true,
    antialias: true,
  });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  var cols = 30;
  var rows = 40;
  var farZ = 25;
  var halfW = 12;

  var positions = [];
  var origX = [];
  var origZ = [];

  function addLine(x1, y1, z1, x2, y2, z2) {
    positions.push(x1, y1, z1, x2, y2, z2);
    origX.push(x1, x2);
    origZ.push(z1, z2);
  }

  for (var r = 0; r <= rows; r++) {
    var z = -(r / rows) * farZ;
    for (var c = 0; c < cols; c++) {
      var x1 = (c / cols - 0.5) * halfW * 2;
      var x2 = ((c + 1) / cols - 0.5) * halfW * 2;
      addLine(x1, 0, z, x2, 0, z);
    }
  }

  for (var c = 0; c <= cols; c++) {
    var x = (c / cols - 0.5) * halfW * 2;
    for (var r = 0; r < rows; r++) {
      var z1 = -(r / rows) * farZ;
      var z2 = -((r + 1) / rows) * farZ;
      addLine(x, 0, z1, x, 0, z2);
    }
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

  var colorArr = new Float32Array(positions.length);
  for (var i = 0; i < positions.length / 3; i++) {
    var z = positions[i * 3 + 2];
    var fade = 1 - Math.abs(z) / farZ;
    fade = Math.max(0, Math.pow(fade, 1.2));
    var bright = 0.15 + fade * 0.3;
    colorArr[i * 3] = 0.08 * bright;
    colorArr[i * 3 + 1] = 0.22 * bright;
    colorArr[i * 3 + 2] = 0.45 * bright;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colorArr, 3));

  var mat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.06,
  });
  var lines = new THREE.LineSegments(geo, mat);
  scene.add(lines);

  var wavePos = new Float32Array(positions.length / 3);
  for (var i = 0; i < positions.length / 3; i++) {
    wavePos[i] = positions[i * 3 + 1];
  }

  var startTime = Date.now();

  function animate() {
    requestAnimationFrame(animate);
    var t = (Date.now() - startTime) / 1000;
    var pos = lines.geometry.attributes.position.array;

    for (var i = 0; i < pos.length / 3; i++) {
      var ix = i * 3;
      var x = pos[ix];
      var z = pos[ix + 2];

      var wave1 = Math.sin(x * 0.3 + z * 0.15 + t * 0.4) * 0.5;
      var wave2 = Math.sin(x * 0.15 + z * 0.3 + t * 0.25) * 0.3;
      var wave3 = Math.sin(x * 0.5 + z * 0.1 + t * 0.6) * 0.15;
      pos[ix + 1] = wave1 + wave2 + wave3;
    }

    lines.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', function() {
    var w = window.innerWidth;
    var h = hero.offsetHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
});
</script>
