<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .Title }}{{ .Title }}{{ if .Params.subtitle }} — {{ .Params.subtitle }}{{ end }} | {{ end }}{{ .Site.Title }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
{{ if .Params.tags }}<meta name="keywords" content="{{ delimit .Params.tags ", " }}">{{ end }}
<link rel="canonical" href="{{ .Permalink }}">

<link rel="icon" type="image/jpeg" href="/assets/img/pudhina.jpg"/>
